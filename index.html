<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cons Vazquez | Calculadora de Fotografía</title>
  <style>
    body {
      font-family: "Georgia", serif;
      background-color: #f9f7f2;
      color: #333;
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }
    header {
      text-align: center;
      background-color: #e7dfd3;
      padding: 30px 20px;
    }
    header img {
      width: 120px;
      margin-bottom: 10px;
    }
    h1 {
      font-size: 1.8em;
      margin: 0;
    }
    h2 {
      color: #5c4f47;
      margin-top: 40px;
      text-align: center;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }
    section {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .calculator {
      background-color: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      margin-bottom: 40px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    select, input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background-color: #a78a73;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
      font-size: 1em;
    }
    button:hover {
      background-color: #8b735c;
    }
    .result {
      background-color: #f0ede8;
      padding: 15px;
      margin-top: 15px;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }
    .mockup {
      text-align: center;
      margin-top: 10px;
    }
    .mockup img {
      max-width: 100%;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    footer {
      background-color: #5c4f47;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

<header>
  <img src="1.png" alt="Logo Cons Vazquez">
  <h1>Cons Vazquez | Servicio de Fotografía</h1>
  <p>Capturando momentos, creando recuerdos.</p>
</header>

<section>
  <h2>📖 Fotolibros</h2>
  <div class="calculator">
    <label for="size">Tamaño del fotolibro:</label>
    <select id="size">
      <option value="189000|164500|30x30">30x30 – $189.000 base (+$16.450/lámina extra)</option>
      <option value="173000|14630|20x30">20x30 – $173.000 base (+$14.630/lámina extra)</option>
      <option value="173000|14630|30x22.5">30x22,5 – $173.000 base (+$14.630/lámina extra)</option>
      <option value="123200|11165|20x40">20x40 – $123.000 base (+$11.165/lámina extra)</option>
    </select>

    <label for="extras">Cantidad de láminas extra (máx. 20):</label>
    <input type="number" id="extras" min="0" max="20" value="0">

    <button onclick="calcFotolibro()">Calcular total</button>
    <div class="result" id="resultFotolibro"></div>

    <div class="mockup" id="mockupFotolibro">
      <img src="https://via.placeholder.com/600x400/edeae4/333?text=Mockup+Fotolibro+30x30" alt="Mockup fotolibro">
    </div>
  </div>

  <h2>📷 Sesiones Fotográficas</h2>
  <div class="calculator">
    <label for="sesion">Elegí tu opción:</label>
    <select id="sesion">
      <option value="250000|15">2 h / 15 imágenes – $250.000</option>
      <option value="300000|20">2 h / 20 imágenes – $300.000</option>
      <option value="350000|30">2 h / 30 imágenes – $350.000</option>
    </select>
    <button onclick="calcSesion()">Calcular total</button>
    <div class="result" id="resultSesion"></div>
  </div>

  <h2>🖼️ Impresiones Fotográficas</h2>
  <div class="calculator">
    <label for="impresion">Tamaño de impresión:</label>
    <select id="impresion">
      <option value="6000|15x21">15x21 – $6.000</option>
      <option value="10000|20x30">20x30 – $10.000</option>
      <option value="17000|50x70">50x70 – $17.000</option>
    </select>
    <label for="cantidad">Cantidad:</label>
    <input type="number" id="cantidad" min="1" value="1">
    <button onclick="calcImpresion()">Calcular total</button>
    <div class="result" id="resultImpresion"></div>
  </div>
</section>

<footer>
  © 2025 Cons Vazquez – Servicio de Fotografía | <a href="https://wa.me/5493513532090" style="color:#f5d7b3;text-decoration:none;">WhatsApp: +54 9 351 353 2090</a>
</footer>

<script>
function calcFotolibro() {
  const [base, extra, nombre] = document.getElementById("size").value.split("|");
  const extras = parseInt(document.getElementById("extras").value);
  const resultDiv = document.getElementById("resultFotolibro");
  const mockup = document.getElementById("mockupFotolibro").querySelector("img");

  if (extras > 20) {
    resultDiv.innerHTML = "⚠️ Excede máxima cantidad de láminas extras.";
    return;
  }

  const total = parseInt(base) + (extras * parseInt(extra));
  resultDiv.innerHTML = `💰 Total estimado: ARS ${total.toLocaleString()}`;

  mockup.src = `https://via.placeholder.com/600x400/edeae4/333?text=Mockup+Fotolibro+${nombre}`;

  const mensaje = `Hola Cons, quiero consultar por un fotolibro ${nombre} con ${extras} láminas extra. El valor estimado es ARS ${total.toLocaleString()}.`;
  const link = `https://wa.me/5493513532090?text=${encodeURIComponent(mensaje)}`;
  resultDiv.innerHTML += `<br><br><a href="${link}" target="_blank"><button>Enviar a WhatsApp</button></a>`;
}

function calcSesion() {
  const [precio, fotos] = document.getElementById("sesion").value.split("|");
  const total = parseInt(precio);
  const resultDiv = document.getElementById("resultSesion");
  resultDiv.innerHTML = `💰 Total: ARS ${total.toLocaleString()}`;

  const mensaje = `Hola Cons, quiero consultar por una sesión de ${fotos} imágenes digitales. El valor estimado es ARS ${total.toLocaleString()}.`;
  const link = `https://wa.me/5493513532090?text=${encodeURIComponent(mensaje)}`;
  resultDiv.innerHTML += `<br><br><a href="${link}" target="_blank"><button>Enviar a WhatsApp</button></a>`;
}

function calcImpresion() {
  const [precio, tam] = document.getElementById("impresion").value.split("|");
  const cantidad = parseInt(document.getElementById("cantidad").value);
  const total = parseInt(precio) * cantidad;
  const resultDiv = document.getElementById("resultImpresion");
  resultDiv.innerHTML = `💰 Total: ARS ${total.toLocaleString()}`;

  const mensaje = `Hola Cons, quiero consultar por ${cantidad} impresión(es) tamaño ${tam}. El valor estimado es ARS ${total.toLocaleString()}.`;
  const link = `https://wa.me/5493513532090?text=${encodeURIComponent(mensaje)}`;
  resultDiv.innerHTML += `<br><br><a href="${link}" target="_blank"><button>Enviar a WhatsApp</button></a>`;
}
</script>

</body>
</html>
